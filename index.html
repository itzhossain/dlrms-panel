<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khotiyan Search</title>
</head>

<body>

<h2>Khotiyan Search</h2>

<input id="id" placeholder="Enter Khotiyan No">
<button onclick="go()">Search</button>

<iframe id="frame" style="width:100%;height:500px;"></iframe>

<script>
function go(){
 let id=document.getElementById('id').value;
 document.getElementById('frame').src='/api/khotiyan/'+id;
}
</script>

</body>
</html>
