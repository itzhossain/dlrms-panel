<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Search</title>
</head>

<body>

<h2>Order Search</h2>

<input id="id" placeholder="Enter Order Number">
<button onclick="go()">Search</button>

<script>
function go(){
 let id=document.getElementById('id').value;

 window.open(
  "https://citizen.dlrms.land.gov.bd/?ORDER_ID_FOR_DETAILS=" + id,
  "_blank"
 );
}
</script>

</body>
</html>
