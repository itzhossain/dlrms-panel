<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Search</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
  text-align:center;
}
.box {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}
input {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  font-size:16px;
}
</style>

</head>
<body>

<h2>📄 DLRMS Order Search</h2>

<div class="box">
  <input id="id" placeholder="Enter Order Number" oninput="go()">
</div>

<script>
let timeout;

function go(){
 clearTimeout(timeout);

 let id = document.getElementById('id').value;

 if(id.length < 5) return;

 timeout = setTimeout(()=>{
  window.open(
   "https://citizen.dlrms.land.gov.bd/?ORDER_ID_FOR_DETAILS=" + id,
   "_blank"
  );
 }, 800);
}
</script>

</body>
</html>
